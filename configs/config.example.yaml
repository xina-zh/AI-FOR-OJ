# Example local configuration for the AI algorithm experiment platform.
app:
  name: ai-for-oj
  env: local

http:
  host: 0.0.0.0
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s
  shutdown_timeout: 10s

log:
  level: info
  format: text

database:
  host: 127.0.0.1
  port: 3306
  user: root
  password: root
  name: ai_for_oj
  params: charset=utf8mb4&parseTime=True&loc=Local
  auto_migrate: true
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime: 30m
  init_max_retries: 10
  init_retry_interval: 3s

sandbox:
  work_dir: /tmp/ai-for-oj-sandbox
  docker_image: gcc:13
  compile_timeout: 10s
  run_timeout_buffer: 500ms
  compile_memory_mb: 512
