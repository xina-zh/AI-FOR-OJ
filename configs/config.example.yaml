# Example local configuration for the AI algorithm experiment platform.
app:
  name: ai-for-oj
  env: local

http:
  host: 0.0.0.0
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s
  shutdown_timeout: 10s

log:
  level: info
  format: text

database:
  host: 127.0.0.1
  port: 3306
  user: root
  password: root
  name: ai_for_oj
  params: charset=utf8mb4&parseTime=True&loc=Local
  auto_migrate: true
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime: 30m
  init_max_retries: 10
  init_retry_interval: 3s

sandbox:
  work_dir: /tmp/ai-for-oj-sandbox
  docker_image: gcc:13
  compile_timeout: 10s
  run_timeout_buffer: 500ms
  compile_memory_mb: 512

llm:
  provider: mock
  model: mock-cpp17
  timeout: 30s
  # When using a real OpenAI-compatible gateway such as gptsapi:
  # provider: openai_compatible
  # base_url: https://api.gptsapi.net/v1
  # api_key: your-api-key
  # model: your-actual-model-name
  # Optional: route glm-* models to Zhipu GLM while keeping the same request-level model selection.
  # glm_base_url: https://open.bigmodel.cn/api/paas/v4
  # glm_api_key: your-zhipu-api-key
  # glm_model_prefix: glm-
  # Optional: route deepseek-* models to DeepSeek while keeping request-level model selection.
  # DeepSeek API is OpenAI-compatible. Official base URL: https://api.deepseek.com
  # Leave these fields empty to keep the DeepSeek route disabled.
  # deepseek_base_url: https://api.deepseek.com
  # deepseek_api_key: your-deepseek-api-key
  # deepseek_model_prefix: deepseek-
